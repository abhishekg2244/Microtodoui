name: build push and update manifest

on:
  workflow_dispatch

jobs:
  docker-build-push:
    runs-on: ubuntu-latest

    permissions:
      contents: write   # 🔥 needed for pushing manifest repo
      packages: write

    steps:
      - name: Checkout App Repo
        uses: actions/checkout@v4

      # 🔐 Login GHCR
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 🏷️ Unique tag (important)
      - name: Set Image Tag
        run: echo "IMAGE_TAG=${{ github.sha }}" >> $GITHUB_ENV

      # 🐳 Build Image
      - name: Build Docker Image
        run: |
          docker build -t ghcr.io/${{ github.actor }}/argocd:${{ env.IMAGE_TAG }} .

      # 🚀 Push Image
      - name: Push Docker Image
        run: |
          docker push ghcr.io/${{ github.actor }}/argocd:${{ env.IMAGE_TAG }}

      # 📦 Clone Manifest Repo
      - name: Clone Manifest Repo
        run: |
          git clone https://github.com/abhishekg2244/my-app-manifests.git

      # ✏️ Update Image in YAML
      - name: Update Manifest
        run: |
          cd my-app-manifests
          sed -i 's|image: .*|image: ghcr.io/${{ github.actor }}/argocd:'"$IMAGE_TAG"'|' deployment.yaml

      # 📤 Commit & Push
      - name: Commit and Push Changes
        run: |
          cd my-app-manifests
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add .
          git commit -m "update image to $IMAGE_TAG"
          git push
