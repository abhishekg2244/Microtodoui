name: create and push docker image

on:
  workflow_dispatch

jobs:
  docker-build-push:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write   # 🔥 MUST

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}   # 🔥 use this

      - name: Build Docker Image
        run: |
          docker build -t ghcr.io/${{ github.actor }}/myapp:latest .

      - name: Push Docker Image
        run: |
          docker push ghcr.io/${{ github.actor }}/myapp:latest
