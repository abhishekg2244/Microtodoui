
name: build push and update manifest

on:
  workflow_dispatch

jobs:
  docker-build-push:
    runs-on: ubuntu-latest

    permissions:
      contents: write   # 🔥 needed for pushing manifest repo
      packages: write

    steps:
      - name: Checkout App Repo
        uses: actions/checkout@v4

      # 🔐 Login GHCR
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 🏷️ Unique tag (important)
      - name: Set Image Tag
        run: echo "IMAGE_TAG=${{ github.sha }}" >> $GITHUB_ENV

      # 🐳 Build Image
      - name: Build Docker Image
        run: |
          docker build -t ghcr.io/${{ github.actor }}/argocd:${{ env.IMAGE_TAG }} .

      # 🚀 Push Image
      - name: Push Docker Image
        run: |
          docker push ghcr.io/${{ github.actor }}/argocd:${{ env.IMAGE_TAG }}

       # 📦 Clone Manifest Repository
      - name: Clone Manifest Repo
        run: |
          git clone https://x-access-token:${{ secrets.GHPAT }}@github.com/abhishekg2244/my-app-manifests.git

      # ✏️ Update Kubernetes Manifest
      - name: Update Manifest
        run: |
          cd my-app-manifests/base

          sed -i "s|image: .*|image: ghcr.io/${{ github.actor }}/argocd:${IMAGE_TAG}|g" deployment.yaml

          cat deployment.yaml

      # 📤 Commit and Push Changes
      - name: Commit and Push Changes
        run: |
          cd my-app-manifests

          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add .

          git commit -m "update image to ${IMAGE_TAG}" || echo "No changes to commit"

          git push origin HEAD

      # # 📦 Clone Manifest Repo
